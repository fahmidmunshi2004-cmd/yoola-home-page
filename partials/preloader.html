<!-- preloader -->
<div id="site-preloader" class="yoola-preloader" aria-live="polite" aria-label="Loading Yoola">
    <div class="yoola-preloader__backdrop"></div>

    <div class="yoola-preloader__inner">
        <div class="yoola-preloader__stage" aria-hidden="true">
            <div class="yoola-preloader__glow"></div>

            <div class="yoola-preloader__spinner"></div>
            <div class="yoola-preloader__orbit"></div>

            <div class="yoola-preloader__satellite-track yoola-preloader__satellite-track--outer">
                <span class="yoola-preloader__satellite yoola-preloader__satellite--outer"></span>
            </div>

            <div class="yoola-preloader__satellite-track yoola-preloader__satellite-track--inner">
                <span class="yoola-preloader__satellite yoola-preloader__satellite--inner"></span>
            </div>

            <div class="yoola-preloader__core">
                <span class="yoola-preloader__core-shine"></span>
                <img src="./assets/img/logo/main-logo.png" alt="Yoola" class="yoola-preloader__logo">
            </div>
        </div>

        <div class="yoola-preloader__word heading__font text-[#fbbf24]">YOOLA</div>
    </div>
</div>
