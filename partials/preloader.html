<!-- preloader -->
<div id="site-preloader" class="yoola-preloader" aria-live="polite" aria-label="Loading Yoola">
    <div class="yoola-preloader__backdrop"></div>

    <div class="yoola-preloader__inner">
        <div class="yoola-preloader__stage" aria-hidden="true">
            <div class="yoola-preloader__glow"></div>
            <svg class="yoola-preloader__rings" viewBox="0 0 160 160" aria-hidden="true">
                <circle class="yoola-preloader__ring yoola-preloader__ring--green" cx="80" cy="80" r="56"></circle>
                <circle class="yoola-preloader__ring yoola-preloader__ring--yellow" cx="80" cy="80" r="56"></circle>
                <circle class="yoola-preloader__ring yoola-preloader__ring--coral" cx="80" cy="80" r="56"></circle>
                <circle class="yoola-preloader__dot yoola-preloader__dot--green" cx="92" cy="135" r="4.5"></circle>
                <circle class="yoola-preloader__dot yoola-preloader__dot--yellow" cx="92" cy="135" r="4.5"></circle>
                <circle class="yoola-preloader__dot yoola-preloader__dot--coral" cx="92" cy="135" r="4.5"></circle>
            </svg>

            <div class="yoola-preloader__core">
                <img src="./assets/img/logo/main-logo.png" alt="Yoola" class="yoola-preloader__logo">
            </div>
        </div>
    </div>
</div>
