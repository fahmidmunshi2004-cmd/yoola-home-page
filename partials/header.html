<!-- header -->
<header class="header__area fixed left-0 right-0 top-0 z-[99] overflow-visible" data-site-header>
    <div
        class="pointer-events-none absolute inset-0 bg-[linear-gradient(90deg,#ffffff_0%,#ffffff_25%,rgba(255,251,239,0.96)_74%,rgba(255,246,217,0.0)_100%)]">
    </div>

    <div class="custom__container relative z-10 flex h-[88px] items-center justify-between px-4 sm:px-6 lg:px-0">
        <div class="header-logo shrink-0">
            <a href="#home" class="inline-flex items-center" data-scroll-link>
                <img src="./assets/img/logo/main-logo.png" alt="Yoola"
                    class="h-[52px] w-[52px] rounded-[16px] object-cover sm:h-[58px] sm:w-[58px]">
            </a>
        </div>

        <div class="header-menu hidden lg:block">
            <nav aria-label="Primary">
                <ul class="flex items-center gap-[30px]">
                    <li>
                        <a href="#services" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border active">Services</a>
                    </li>
                    <li>
                        <a href="#food" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border">Food</a>
                    </li>
                    <li>
                        <a href="#express" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border">Express</a>
                    </li>
                    <li>
                        <a href="#partners" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border">Partners</a>
                    </li>
                    <li>
                        <a href="#blog" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border">Blog</a>
                    </li>
                    <li>
                        <a href="#company" data-nav-link
                            class="header__menu-link text-[#4A5568] text-lg font-normal custom__border">Company</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="custom__button hidden lg:flex">
            <a href="#download" class="btn" data-scroll-link>
                Download App
            </a>
        </div>

        <button type="button"
            class="inline-flex h-[48px] w-[48px] items-center justify-center rounded-full border border-[#E5E7EB] bg-white/90 text-[#0F172A] shadow-[0_12px_28px_rgba(15,23,42,0.08)] transition duration-300 hover:border-[#F4D98A] hover:bg-[#FFF8E6] hover:text-[#FBBF24] lg:hidden"
            data-mobile-nav-toggle aria-controls="mobile-nav-panel" aria-expanded="false"
            aria-label="Open navigation menu">
            <span class="sr-only">Open navigation menu</span>
            <span class="flex flex-col items-center justify-center gap-[5px]">
                <span class="block h-[2px] w-5 rounded-full bg-current"></span>
                <span class="block h-[2px] w-5 rounded-full bg-current"></span>
                <span class="block h-[2px] w-5 rounded-full bg-current"></span>
            </span>
        </button>
    </div>

    <div class="fixed inset-0 z-[110] bg-black/50 opacity-0 invisible backdrop-blur-[2px] transition duration-300 data-[open=true]:visible data-[open=true]:opacity-100 lg:hidden"
        data-mobile-nav-overlay data-open="false"
        style="cursor: url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'&gt;&lt;g transform='rotate(45 16 16)'&gt;&lt;circle cx='16' cy='16' r='1.5' fill='white' stroke='black' stroke-width='0.5'/&gt;&lt;line x1='16' y1='0' x2='16' y2='32' stroke='white' stroke-width='2' stroke-linecap='round'/&gt;&lt;line x1='0' y1='16' x2='32' y2='16' stroke='white' stroke-width='2' stroke-linecap='round'/&gt;&lt;line x1='16' y1='0' x2='16' y2='32' stroke='white' stroke-width='0.5' stroke-linecap='round'/&gt;&lt;line x1='0' y1='16' x2='32' y2='16' stroke='white' stroke-width='0.5' stroke-linecap='round'/&gt;&lt;/g&gt;&lt;/svg&gt;&quot;) 16 16, crosshair;">
    </div>

    <div id="mobile-nav-panel"
        class="fixed right-0 top-0 z-[120] flex h-screen w-[min(88vw,360px)] max-w-full translate-x-full flex-col bg-[linear-gradient(180deg,rgba(255,255,255,0.94)_0%,rgba(255,248,230,0.9)_100%)] px-5 pb-8 pt-5 shadow-[-18px_0_42px_rgba(15,23,42,0.16)] backdrop-blur-[2px] transition duration-300 data-[open=true]:translate-x-0 lg:hidden"
        data-mobile-nav data-open="false" aria-hidden="true"
        style="cursor: url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'&gt;&lt;g transform='rotate(45 16 16)'&gt;&lt;circle cx='16' cy='16' r='1.5' fill='white' stroke='black' stroke-width='0.5'/&gt;&lt;line x1='16' y1='0' x2='16' y2='32' stroke='white' stroke-width='2' stroke-linecap='round'/&gt;&lt;line x1='0' y1='16' x2='32' y2='16' stroke='white' stroke-width='2' stroke-linecap='round'/&gt;&lt;line x1='16' y1='0' x2='16' y2='32' stroke='white' stroke-width='0.5' stroke-linecap='round'/&gt;&lt;line x1='0' y1='16' x2='32' y2='16' stroke='white' stroke-width='0.5' stroke-linecap='round'/&gt;&lt;/g&gt;&lt;/svg&gt;&quot;) 16 16, crosshair;">
        <div class="flex items-center justify-between gap-4">
            <a href="#home" class="inline-flex items-center gap-3" data-scroll-link>
                <img src="./assets/img/logo/main-logo.png" alt="Yoola"
                    class="h-[48px] w-[48px] rounded-[14px] object-cover">
                <span class="heading__font text-[28px] font-bold tracking-[-0.08em] text-[#0F172A]">YOOLA</span>
            </a>

            <button type="button"
                class="inline-flex h-[44px] w-[44px] items-center justify-center rounded-full border border-[#E5E7EB] bg-white text-[18px] text-[#475467] transition duration-300 hover:border-[#F4D98A] hover:text-[#FBBF24]"
                data-mobile-nav-close aria-label="Close navigation menu">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <p class="mt-6 text-[14px] font-medium uppercase tracking-[0.18em] text-[#98A2B3]">
            Navigate Yoola faster
        </p>

        <nav class="mt-6" aria-label="Mobile primary">
            <ul class="space-y-2">
                <li>
                    <a href="#services" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24] active">
                        <span>Services</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
                <li>
                    <a href="#food" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24]">
                        <span>Food</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
                <li>
                    <a href="#express" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24]">
                        <span>Express</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
                <li>
                    <a href="#partners" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24]">
                        <span>Partners</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
                <li>
                    <a href="#blog" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24]">
                        <span>Blog</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
                <li>
                    <a href="#company" data-nav-link
                        class="header__menu-link custom__border flex items-center justify-between rounded-[18px] px-4 py-3 text-[18px] font-medium text-[#4A5568] transition duration-300 hover:bg-white/80 hover:text-[#FBBF24]">
                        <span>Company</span>
                        <i class="fa-solid fa-arrow-right-long text-[14px]"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <div
            class="mt-auto rounded-[28px] border border-[#F4D98A] bg-white/85 p-4 shadow-[0_18px_34px_rgba(15,23,42,0.06)]">
            <p class="text-[14px] font-medium uppercase tracking-[0.16em] text-[#98A2B3]">Ready To Order?</p>
            <p class="mt-2 text-[18px] font-semibold leading-[1.45] tracking-[-0.03em] text-[#1F2937]">
                Open the app and start your next delivery in seconds.
            </p>

            <div class="custom__button mt-4">
                <a href="#download" class="btn !flex !h-[52px] !w-full !justify-center !rounded-[16px]"
                    data-scroll-link>
                    Download App
                </a>
            </div>
        </div>
    </div>

</header>
